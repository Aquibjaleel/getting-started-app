name: 'Enterprise DevSecOps Deployment Pipeline'

on:
  push:
    branches: [ "main" ]

jobs:
  security_and_build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the application code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up the Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 3. Run the application test suite
    - name: Execute App Unit Tests
      run: |
        npm ci
        npm test --if-present

    # 4. CONTAINERIZATION: Set up advanced build tools
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. DOCKER HUB REGISTRY LOGIN: Access the secure vault variables
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 6. BUILD AND PUSH: Compile the image and instantly upload it to the cloud
    - name: Build and Push Production Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/getting-started-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/getting-started-app:${{ github.sha }}

    # 7. TRIVY SECURITY SCAN: Verify the uploaded container image layers
    - name: Run Trivy Container Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/getting-started-app:${{ github.sha }}'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'